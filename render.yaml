databases:
  - name: dream-destiny-db
    plan: free
    databaseName: dreamdestiny
    user: dreamdestiny

services:
  - type: web
    name: dream-destiny-center
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile &&
      BASE_PATH=/ PORT=10000 pnpm --filter @workspace/dream-destiny run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dream-destiny-db
          property: connectionString
