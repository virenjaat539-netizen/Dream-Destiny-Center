kind = "web"
previewPath = "/"
title = "Dream Destiny Center of PTE Elites"
version = "1.0.0"
id = "artifacts/dream-destiny"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25610

[services.development]
run = "pnpm --filter @workspace/dream-destiny run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dream-destiny", "run", "build" ]
publicDir = "artifacts/dream-destiny/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25610"
BASE_PATH = "/"
